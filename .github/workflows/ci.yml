name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

jobs:
  test:
    runs-on: sylphx-linux-standard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust retrieval core
        run: cargo build --release

      - name: Rust core tests
        run: cargo test

      - name: Golden retrieval evals
        run: bun test test/golden-retrieval.test.ts

      - name: Retrieval parity (frozen baseline)
        run: bun test test/retrieval-parity.test.ts

      - name: Type check
        run: bun run type-check

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Public surface audit (README discovery)
        run: bun run test:public-surface

      - name: Public benchmark proof
        run: bun run benchmark:public-proof

      - name: Release gate
        run: bun run benchmark:release-gate

      - name: Docs build
        run: bun run docs:build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/core/coverage/lcov.info
          fail_ci_if_error: false
