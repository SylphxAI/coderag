name: Native multi-arch

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/mcp-server/**'
      - 'bin/coderag-mcp'
      - 'scripts/stage-rust-mcp.ts'
      - 'scripts/assemble-multiarch-natives.ts'
      - '.github/workflows/native-build.yml'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/mcp-server/**'
      - 'bin/coderag-mcp'
      - 'scripts/stage-rust-mcp.ts'
      - 'scripts/assemble-multiarch-natives.ts'
      - '.github/workflows/native-build.yml'
      - '.github/workflows/release.yml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Both Darwin targets on macos-latest (arm64 host); x86_64 is
          # cross-compiled. macos-13 (Intel) runners queue for long periods.
          - host: macos-latest
            target: aarch64-apple-darwin
            platform_key: darwin-arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            platform_key: darwin-x64
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform_key: linux-x64-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform_key: linux-arm64-gnu

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-${{ matrix.settings.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            native-${{ matrix.settings.target }}-

      - name: Build release natives
        run: |
          set -euo pipefail
          cargo build --release -p coderag-mcp-server -p coderag-cli --target ${{ matrix.settings.target }}
          mkdir -p "native-out"
          for name in coderag-mcp-server coderag-cli; do
            BIN="target/${{ matrix.settings.target }}/release/${name}"
            test -f "$BIN"
            chmod +x "$BIN"
            file "$BIN" || true
            # Fail-closed: binary must be non-trivial
            test "$(wc -c < "$BIN")" -gt 100000
            cp "$BIN" "native-out/${name}"
            chmod +x "native-out/${name}"
          done
          ls -la native-out

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderag-native-${{ matrix.settings.target }}
          path: native-out/
          if-no-files-found: error
          retention-days: 14

  assemble-check:
    name: Assemble multi-arch packages
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: coderag-native-*

      - name: Assemble platform packages (fail-closed)
        run: bun scripts/assemble-multiarch-natives.ts

      - name: List assembled packages
        run: |
          set -euo pipefail
          for dir in packages/mcp-server/npm/*/; do
            echo "== $dir =="
            ls -la "$dir"
            for name in coderag-mcp-server coderag-cli; do
              test -x "${dir}${name}"
              file "${dir}${name}" || true
            done
          done

      - name: Arch-aware wrapper smoke (host linux x64)
        run: |
          set -euo pipefail
          chmod +x bin/coderag-mcp packages/mcp-server/bin/coderag-mcp
          # Stage both host natives into bin/native from linux-x64 package
          mkdir -p bin/native packages/mcp-server/bin/native
          for name in coderag-mcp-server coderag-cli; do
            cp "packages/mcp-server/npm/linux-x64-gnu/${name}" "bin/native/${name}"
            cp "packages/mcp-server/npm/linux-x64-gnu/${name}" "packages/mcp-server/bin/native/${name}"
            chmod +x "bin/native/${name}" "packages/mcp-server/bin/native/${name}"
          done
          # Wrapper should resolve staged native and fail-closed without TS
          timeout 3s bin/coderag-mcp --help >/tmp/coderag-help.txt 2>&1 || true
          # Binary may not support --help; ensure we did not print TS fallback message
          if grep -qi 'use_ts_transport\|dist/index.js' /tmp/coderag-help.txt; then
            echo "FAIL: TS fallback path detected"
            cat /tmp/coderag-help.txt
            exit 1
          fi
          # Direct exec of assembled linux binary + doctor must resolve sibling CLI
          timeout 2s packages/mcp-server/npm/linux-x64-gnu/coderag-mcp-server --help >/dev/null 2>&1 || true
          test -x packages/mcp-server/npm/linux-x64-gnu/coderag-mcp-server
          test -x packages/mcp-server/npm/linux-x64-gnu/coderag-cli
          doctor_out="$(packages/mcp-server/npm/linux-x64-gnu/coderag-mcp-server doctor 2>&1 || true)"
          echo "$doctor_out"
          if ! printf '%s' "$doctor_out" | grep -q 'engine cli: .*/coderag-cli'; then
            echo "FAIL: doctor did not resolve sibling coderag-cli from platform package"
            exit 1
          fi
          if printf '%s' "$doctor_out" | grep -qi 'engine cli: unavailable'; then
            echo "FAIL: engine cli unavailable after packaging both natives"
            exit 1
          fi
          echo "PASS: multi-arch assemble + wrapper smoke + sibling CLI resolve"
