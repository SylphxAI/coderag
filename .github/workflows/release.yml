name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  # Multi-arch native matrix (GitHub-hosted). Fail-closed: all targets required
  # before the publish job can assemble optionalDependency packages.
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Both Darwin targets on macos-latest; x86_64 is cross-compiled.
          # macos-13 Intel runners often queue indefinitely.
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    name: Native ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-native-${{ matrix.settings.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-native-${{ matrix.settings.target }}-

      - name: Build release natives
        run: |
          set -euo pipefail
          cargo build --release -p coderag-mcp-server -p coderag-cli --target ${{ matrix.settings.target }}
          mkdir -p native-out
          for name in coderag-mcp-server coderag-cli; do
            BIN="target/${{ matrix.settings.target }}/release/${name}"
            test -f "$BIN"
            chmod +x "$BIN"
            file "$BIN" || true
            test "$(wc -c < "$BIN")" -gt 100000
            cp "$BIN" "native-out/${name}"
            chmod +x "native-out/${name}"
          done
          ls -la native-out

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: coderag-native-${{ matrix.settings.target }}
          path: native-out/
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build-natives
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    with:
      # When artifact is set, reusable workflow skips the default build step and
      # downloads coderag-native-* into artifacts/. prepublish rebuilds TS,
      # assembles platform packages (fail-closed all arches), and prepares bins.
      artifact: 'coderag-native-*'
      prepublish: |
        set -euo pipefail
        if ! command -v rustc >/dev/null 2>&1; then
          if [ -f "$HOME/.cargo/env" ]; then
            # shellcheck source=/dev/null
            . "$HOME/.cargo/env"
          fi
        fi
        if ! command -v rustc >/dev/null 2>&1; then
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          # shellcheck source=/dev/null
          . "$HOME/.cargo/env"
        fi
        export PATH="${HOME}/.cargo/bin:${PATH}"

        echo "== multi-arch artifacts =="
        ls -laR artifacts || true

        bun run build
        bun scripts/assemble-multiarch-natives.ts

        # Keep host-path staging for local-style layout inside the published
        # package (optional); primary consumer path is optionalDependencies.
        # Stage linux x64 into bin/native as a documented linux fallback when
        # the optional dep package is present alongside. Both natives required
        # so tools/call can resolve sibling coderag-cli without monorepo build.
        mkdir -p packages/mcp-server/bin/native bin/native
        for name in coderag-mcp-server coderag-cli; do
          if [ -f "packages/mcp-server/npm/linux-x64-gnu/${name}" ]; then
            cp "packages/mcp-server/npm/linux-x64-gnu/${name}" "packages/mcp-server/bin/native/${name}"
            cp "packages/mcp-server/npm/linux-x64-gnu/${name}" "bin/native/${name}"
            chmod +x "packages/mcp-server/bin/native/${name}" "bin/native/${name}"
          fi
        done

        chmod +x packages/mcp-server/bin/coderag-mcp bin/coderag-mcp
        test -x packages/mcp-server/bin/coderag-mcp
        head -n 8 packages/mcp-server/bin/coderag-mcp

        # Fail-closed: every platform package must contain both natives
        for dir in packages/mcp-server/npm/*/; do
          test -f "${dir}package.json"
          for name in coderag-mcp-server coderag-cli; do
            test -x "${dir}${name}"
            test "$(wc -c < "${dir}${name}")" -gt 100000
            echo "OK $(basename "$dir") ${name} $(wc -c < "${dir}${name}") bytes"
            file "${dir}${name}" || true
          done
        done

        # Sync platform package versions to mcp-server (covers version-PR path
        # when fixed group already aligned them).
        bun scripts/sync-platform-versions.ts
      postpublish: |
        set -euo pipefail
        bun scripts/verify-multiarch-readback.ts
    secrets: inherit
